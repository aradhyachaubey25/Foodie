<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu — Foodie</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header class="header header-inner">
    <nav class="navbar wrapper nav-with-search flex items-center gap-2">
      <a href="index.html" class="logo">Foodie.</a>

      <form class="nav-search-form" action="menu.html" method="get" role="search">
        <div class="nav-search-inner flex items-center gap-1">
          <select name="type" class="nav-search-type" aria-label="Search by">
            <option value="dish">Dishes</option>
          </select>
          <span class="nav-search-divider" aria-hidden="true"></span>
          <i class="fa-solid fa-magnifying-glass nav-search-icon" aria-hidden="true"></i>
          <input type="search" name="q" class="nav-search-input" placeholder="Search dishes…"
            aria-label="Search dishes" autocomplete="off">
        </div>
      </form>

      <ul class="navlist flex gap-3">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html" class="active">Menu</a></li>
        <li><a href="features.html">Features</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="testimonials.html">Reviews</a></li>
      </ul>

      <div class="nav-right flex gap-2">
        <button class="auth-btn" id="open-auth-modal" type="button">Login / Sign Up</button>
        <a href="#" class="cart-icon">
          <i class="fa-solid fa-bag-shopping"></i>
        </a>

        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="hamburger">
          <i class="fa-solid fa-bars"></i>
        </label>
      </div>
    </nav>

    <div class="mobile-menu wrapper">
      <form class="nav-search-form nav-search-form--mobile" action="menu.html" method="get" role="search">
        <div class="nav-search-inner flex items-center gap-1">
          <select name="type" class="nav-search-type" aria-label="Search by">
            <option value="dish">Dishes</option>
          </select>
          <span class="nav-search-divider" aria-hidden="true"></span>
          <i class="fa-solid fa-magnifying-glass nav-search-icon" aria-hidden="true"></i>
          <input type="search" name="q" class="nav-search-input" placeholder="Search dishes…"
            aria-label="Search dishes" autocomplete="off">
        </div>
      </form>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html" class="active">Menu</a></li>
        <li><a href="features.html">Features</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="testimonials.html">Reviews</a></li>
      </ul>
    </div>
  </header>

  <main class="page-main">
    <section id="menu" class="menu wrapper">
      <h2 class="section-heading">Our Menu</h2>

      <div class="menu-dashboard" role="region" aria-label="Menu controls">
        <div class="menu-toolbar menu-toolbar--sort-only flex items-center gap-2">
          <label class="menu-sort-wrap flex items-center gap-1">
            <span class="menu-sort-label">Type</span>
            <select id="menu-veg-filter" class="menu-sort-select" aria-label="Filter by veg or non-veg">
              <option value="all">All</option>
              <option value="veg">Veg</option>
              <option value="non-veg">Non-Veg</option>
            </select>
          </label>
          <label class="menu-sort-wrap flex items-center gap-1">
            <span class="menu-sort-label">Sort</span>
            <select id="menu-sort" class="menu-sort-select" aria-label="Sort menu items">
              <option value="default">Default</option>
              <option value="name-asc">Name (A–Z)</option>
              <option value="name-desc">Name (Z–A)</option>
              <option value="price-asc">Price (low to high)</option>
              <option value="price-desc">Price (high to low)</option>
            </select>
          </label>
        </div>
      </div>

      <p id="menu-empty" class="menu-empty" hidden>No dishes match your search.</p>

      <div class="menu-grid"></div>

      <div id="menu-actions" class="menu-actions" hidden>
        <button id="menu-add-to-cart-cta" class="menu-add-cart-btn" type="button">Add to Cart (0)</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 Foodie. All Rights Reserved.</p>
  </footer>

  <div id="auth-modal" class="auth-modal">
    <div class="auth-modal-content">
      <button id="close-auth-modal" class="close-auth" type="button" aria-label="Close auth form">&times;</button>
      <h2>Welcome to Foodie</h2>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-auth-tab="login">Login</button>
        <button type="button" class="auth-tab" data-auth-tab="signup">Create Account</button>
      </div>

      <form id="login-form" class="auth-form active">
        <input type="email" id="login-email" placeholder="Email Address" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit" class="auth-submit">Login</button>
      </form>

      <form id="signup-form" class="auth-form">
        <input type="text" id="signup-name" placeholder="Full Name" required>
        <input type="email" id="signup-email" placeholder="Email Address" required>
        <input type="password" id="signup-password" placeholder="Create Password" required>
        <button type="submit" class="auth-submit">Create Account</button>
      </form>

      <p id="auth-message" class="auth-message"></p>
    </div>
  </div>

  <script src="script.js"></script>

</body>

</html>
